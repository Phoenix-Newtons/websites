<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillShare Community</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <h1>🤝 SkillShare Community</h1>
    <p>Learn. Teach. Grow together.</p>
  </header>

  <main class="container">
    <div class="top-bar">
      <input type="text" id="search" placeholder="Search by skill or location...">
      <button onclick="searchSkills()">🔍 Search</button>
    </div>

    <div class="card" id="formCard">
      <h2>➕ Share Your Skill</h2>
      <form id="skill-form">
        <input type="text" id="name" placeholder="Your Name" required style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc">
        <input type="text" id="skill" placeholder="Skill Title (e.g., Python Tutor)" required style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc">
        <input type="text" id="location" placeholder="Location" required style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc">
        <input type="tel" id="contact" placeholder="WhatsApp (with country code, e.g., 233...)" required style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc">
        <textarea id="desc" placeholder="Describe your skill..." rows="3" required style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #ccc"></textarea>
        
        <label style="display:block;margin:10px 0 5px;font-weight:bold">📷 Profile Photo</label>
        <input type="file" id="photo" accept="image/*" style="width:100%;padding:8px;margin:8px 0">
        
        <label style="display:block;margin:10px 0 5px;font-weight:bold">🎥 Videos (MP4, WebM)</label>
        <input type="file" id="videos" accept="video/*" multiple style="width:100%;padding:8px;margin:8px 0">
        
        <label style="display:block;margin:10px 0 5px;font-weight:bold">📄 Documents (PDF, DOCX, ZIP)</label>
        <input type="file" id="docs" accept=".pdf,.docx,.zip,.txt" multiple style="width:100%;padding:8px;margin:8px 0">
        
        <button type="submit" id="submit-btn" style="width:100%;margin-top:15px">🚀 Publish Skill</button>
      </form>
    </div>

    <h2 style="margin-top:30px">📚 Available Skills</h2>
    <div id="skills"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
